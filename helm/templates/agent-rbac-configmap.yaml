{{- if .Values.agentRBAC }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "arbetern.fullname" . }}-agent-rbac
  labels:
    {{- include "arbetern.labels" . | nindent 4 }}
data:
  {{- range $agentID, $teams := .Values.agentRBAC }}
  {{ $agentID }}.yaml: |
    allowed_teams:
      {{- range $teams }}
      - {{ . }}
      {{- end }}
  {{- end }}
{{- end }}
